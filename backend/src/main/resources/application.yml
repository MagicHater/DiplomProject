spring:
  application:
    name: adaptive-testing-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/adaptive_testing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
