spring:
  application:
    name: adaptive-testing-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/adaptive_testing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


adaptive-testing:
  session:
    max-questions: ${ADAPTIVE_MAX_QUESTIONS:10}

ai:
  yandex:
    enabled: true
    base-url: ${AI_YANDEX_BASE_URL:https://llm.api.cloud.yandex.net}
    api-key: AQVNxrgsqdmcn0yFsO0_ttN7Pwo3EaWZj9UufZ5S
    iam-token: ${AI_YANDEX_IAM_TOKEN:}
    folder-id: b1gt1m379nqn3gbei1bl
    model-uri: gpt://b1gt1m379nqn3gbe1blj/yandexgpt-lite/latest
    disable-logging: ${AI_YANDEX_DISABLE_LOGGING:true}
    timeout-ms: 10000
