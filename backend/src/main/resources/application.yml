spring:
  application:
    name: adaptive-testing-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/adaptive_testing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${FLYWAY_URL:${DB_URL:jdbc:postgresql://127.0.0.1:5432/adaptive_testing}}
    user: ${FLYWAY_USER:${DB_USERNAME:postgres}}
    password: ${FLYWAY_PASSWORD:${DB_PASSWORD:postgres}}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


adaptive-testing:
  session:
    max-questions: ${ADAPTIVE_MAX_QUESTIONS:10}
