spring:
  application:
    name: adaptive-testing-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/adaptive_testing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


adaptive-testing:
  session:
    max-questions: ${ADAPTIVE_MAX_QUESTIONS:10}

ai:
  yandex:
    enabled: ${AI_YANDEX_ENABLED:false}
    base-url: ${AI_YANDEX_BASE_URL:https://llm.api.cloud.yandex.net}
    api-key: ${AI_YANDEX_API_KEY:}
    iam-token: ${AI_YANDEX_IAM_TOKEN:}
    folder-id: ${AI_YANDEX_FOLDER_ID:}
    model-uri: ${AI_YANDEX_MODEL_URI:gpt://<folder-id>/yandexgpt-lite/latest}
    disable-logging: ${AI_YANDEX_DISABLE_LOGGING:true}
    timeout-ms: ${AI_YANDEX_TIMEOUT_MS:10000}
