spring:
  application:
    name: adaptive-testing-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/adaptive_testing
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: "change-this-secret-key-at-least-32-bytes"
    expiration-minutes: 60
