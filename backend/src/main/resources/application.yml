spring:
  application:
    name: adaptive-testing-backend
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
